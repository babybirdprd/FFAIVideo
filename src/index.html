<!DOCTYPE html>
<html>
<head>
    <title>FFAIVideo Generator</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        label { display: block; margin-top: 10px; }
        input, select { width: 100%; padding: 5px; margin-top: 5px; }
        button { margin-top: 20px; padding: 10px; }
        #progress, #result { margin-top: 20px; }
    </style>
</head>
<body>
    <h1>FFAIVideo Generator</h1>
    <form id="videoForm">
        <label for="provider">Provider:</label>
        <select id="provider" required>
            <option value="g4f">g4f</option>
            <option value="openai">OpenAI</option>
            <option value="moonshot">Moonshot</option>
        </select>

        <label for="termsNum">Number of Terms:</label>
        <input type="number" id="termsNum" value="8" required>

        <label for="subtitleMaxWidth">Subtitle Max Width:</label>
        <input type="number" id="subtitleMaxWidth" value="9" required>

        <label for="videoClipDuration">Video Clip Duration (seconds):</label>
        <input type="number" id="videoClipDuration" value="12" required>

        <label for="voiceName">Voice Name:</label>
        <input type="text" id="voiceName" value="zh-CN-YunjianNeural" required>

        <label for="bgMusic">Background Music Path:</label>
        <input type="text" id="bgMusic" placeholder="Path to background music file">

        <label for="output">Output Path:</label>
        <input type="text" id="output" placeholder="Path to output directory" required>

        <label for="pexelsApiKey">Pexels API Key:</label>
        <input type="text" id="pexelsApiKey" required>

        <label for="videoScript">Video Script:</label>
        <textarea id="videoScript" rows="5" required></textarea>

        <button type="submit">Generate Video</button>
    </form>

    <div id="progress"></div>
    <div id="result"></div>

    <script>
        const { ipcRenderer } = require('electron');

        document.getElementById('videoForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const config = {
                provider: document.getElementById('provider').value,
                termsNum: parseInt(document.getElementById('termsNum').value),
                subtitleMaxWidth: parseInt(document.getElementById('subtitleMaxWidth').value),
                videoClipDuration: parseInt(document.getElementById('videoClipDuration').value),
                voiceName: document.getElementById('voiceName').value,
                bgMusic: document.getElementById('bgMusic').value,
                output: document.getElementById('output').value,
                pexels: {
                    apiKey: document.getElementById('pexelsApiKey').value,
                },
                videoScript: document.getElementById('videoScript').value,
            };
            ipcRenderer.send('generate-video', config);
        });

        ipcRenderer.on('progress-update', (event, progress) => {
            document.getElementById('progress').textContent = `Progress: ${progress}%`;
        });

        ipcRenderer.on('video-generated', (event, videoPath) => {
            document.getElementById('result').textContent = `Video generated: ${videoPath}`;
        });

        ipcRenderer.on('generation-error', (event, errorMessage) => {
            document.getElementById('result').textContent = `Error: ${errorMessage}`;
        });
    </script>
</body>
</html>
